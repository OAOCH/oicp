name: CI

# Lint de tipos + build + tests en cada push y PR.
# NO bloquea el merge (los jobs informan, no exigen): Oscar itera rápido.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck servidor
        run: npx tsc -p tsconfig.server.json --noEmit
        continue-on-error: true
      - name: Build frontend
        run: npx vite build
      - name: Tests
        run: npm test --if-present
        continue-on-error: true
